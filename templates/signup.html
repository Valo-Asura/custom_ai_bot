{% extends 'base.html' %}
{% block title %}Signup | Personal AI Bot Builder{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="card narrow-card">
        <h1>Signup</h1>
        <p class="muted">Create a non-admin user account.</p>
        <form method="post" class="stack-form">
            <label>Email
                <input type="email" name="email" required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <label>Confirm Password
                <input type="password" name="confirm_password" required>
            </label>
            <button type="submit">Create Account</button>
        </form>
        <p class="inline-note">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
    </div>
</section>
{% endblock %}
