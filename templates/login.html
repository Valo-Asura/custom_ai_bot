{% extends 'base.html' %}
{% block title %}Login | Personal AI Bot Builder{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="card narrow-card">
        <h1>Login</h1>
        <p class="muted">Use the default admin from your environment variables or sign in with a test user.</p>
        <form method="post" class="stack-form">
            <label>Email
                <input type="email" name="email" required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button type="submit">Login</button>
        </form>
        <p class="inline-note">Need a test account? <a href="{{ url_for('signup') }}">Create one</a>.</p>
    </div>
</section>
{% endblock %}
