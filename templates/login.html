{% extends 'base.html' %}
{% block title %}Login | RAG Bot Builder{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="card narrow-card">
        <h1 class="auth-title">Welcome back.</h1>
        <p class="muted auth-subtitle">Sign in to your personal AI workspace.</p>
        <form method="post" class="stack-form">
            <label>Email
                <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
            </label>
            <label>Password
                <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
            </label>
            <button type="submit">Login &rarr;</button>
        </form>
        <p class="inline-note auth-note">Need a test account? <a href="{{ url_for('signup') }}">Create one</a>.</p>
    </div>
</section>
{% endblock %}
